<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Storica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1f1f1f;
            --text-primary: #e5e5e5;
            --text-secondary: #888888;
            --accent: #7c3aed;
            --accent-hover: #8b5cf6;
            --ruler-line: #2a2a2a;
            --card-bg: #1a1a1a;
            --border-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow: hidden;
        }

        /* ========== TOAST ========== */
        .toast-container {
            position: fixed;
            top: 5rem;
            right: 1rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }

        .toast {
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.8125rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.5s forwards;
            pointer-events: auto;
            max-width: 360px;
        }

        .toast.success {
            border-left: 3px solid #10b981;
        }

        .toast.error {
            border-left: 3px solid #ef4444;
        }

        .toast.info {
            border-left: 3px solid var(--accent);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        /* ========== TOOLBAR ========== */
        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            padding: 0.5rem 0.75rem;
            z-index: 50;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.4rem;
        }

        .toolbar-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            width: 100%;
            flex-wrap: wrap;
        }

        .toolbar-row.top-row {
            flex-wrap: nowrap;
        }

        .search-wrapper {
            flex: 1;
            min-width: 100px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 0.4rem 0.6rem;
            padding-right: 1.8rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.8125rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-clear {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            padding: 0.15rem 0.3rem;
            line-height: 1;
            border-radius: 4px;
        }

        .search-clear:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn {
            padding: 0.3rem 0.6rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.6875rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            line-height: 1.3;
            min-width: 36px;
        }

        .btn:hover {
            background: var(--bg-primary);
        }

        .btn.danger {
            color: #ef4444;
        }

        .tl-select {
            padding: 0.3rem 0.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.6875rem;
            cursor: pointer;
            max-width: 130px;
        }

        .tl-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Zoom */
        .zoom-group {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .zoom-slider {
            width: 60px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border-color);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid var(--bg-secondary);
        }

        .zoom-label {
            font-size: 0.625rem;
            color: var(--text-secondary);
            min-width: 30px;
            text-align: center;
        }

        /* Category filter pills */
        .pill-row {
            display: flex;
            gap: 0.25rem;
            flex-wrap: wrap;
            width: 100%;
            padding: 0.15rem 0;
        }

        .pill {
            padding: 0.12rem 0.4rem;
            border-radius: 10px;
            font-size: 0.5625rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border-color);
            opacity: 0.5;
            background: var(--bg-tertiary);
            user-select: none;
            transition: opacity 0.15s;
        }

        .pill.active {
            opacity: 1;
            border-color: var(--accent);
        }

        .pill:hover {
            opacity: 0.8;
        }

        /* Mobile extra */
        .mobile-extra {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            /* padding: 0.3rem 0; */
            /* border-top: 1px solid var(--border-color); */
            /* margin-top: 0.3rem; */
        }

        .mobile-extra.open {
            display: flex;
        }

        .mob-toggle {
            display: none;
        }

        /* ========== RULER ========== */
        .timeline-ruler {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            padding: 100vh 0 6rem 0;
        }

        .ruler-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--ruler-line);
        }

        .year-mark {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ruler-line);
        }

        .year-mark.year {
            width: 8px;
            height: 1px;
        }

        .year-mark.decade {
            width: 16px;
            height: 2px;
        }

        .year-mark.century {
            width: 32px;
            height: 3px;
        }

        .century-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .century-label.left-side {
            margin-left: -45px;
            text-align: right;
        }

        .century-label.right-side {
            margin-left: 15px;
            text-align: left;
        }

        /* ========== EVENT CARD ========== */
        .event-card {
            position: absolute;
            left: 50%;
            background: var(--card-bg);
            border-radius: 10px;
            padding: 0.5rem 1rem;
            min-width: 140px;
            max-width: 280px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            z-index: 10;
            transition: top 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                box-shadow 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                border-color 0.3s,
                transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                background 0.3s;
            will-change: top;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25), 0 0 0 0 transparent;
        }

        .event-card.expanded {
            z-index: 40;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(124, 58, 237, 0.2);
            background: #1e1e1e;
        }

        .event-card:not(.expanded):hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(124, 58, 237, 0.15);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .event-card:not(.expanded):hover.left-side {
            transform: translateX(-100%) translateY(-1px);
        }

        .event-card:not(.expanded):hover.right-side {
            transform: translateY(-1px);
        }

        .event-card.left-side {
            transform: translateX(-100%);
            margin-left: -16px;
        }

        .event-card.right-side {
            margin-left: 16px;
        }

        .event-card.expanded.left-side {
            transform: translateX(-100%);
        }

        .event-card.expanded.right-side {
            transform: none;
        }

        .event-date {
            font-size: 0.6875rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.25rem;
            line-height: 1;
            letter-spacing: 0.02em;
        }

        .event-name {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .event-description {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.45;
            opacity: 0;
        }

        .event-card.expanded .event-description {
            max-height: 500px;
            padding-top: 0.5rem;
            opacity: 1;
        }

        /* Event node on ruler */
        .event-node {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.7);
            z-index: 5;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                box-shadow 0.3s;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.3);
        }

        .event-node.expanded-node {
            transform: translateX(-50%) scale(1.6);
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.5);
        }

        /* SVG */
        .links-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
            z-index: 2;
        }

        /* Card buttons */
        .card-btn {
            position: absolute;
            top: 0.3rem;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.75rem;
            opacity: 0;
            padding: 0.2rem 0.35rem;
            line-height: 1;
            pointer-events: none;
            transition: opacity 0.2s, color 0.15s, background 0.15s;
            border-radius: 4px;
        }

        .delete-btn {
            right: 0.3rem;
        }

        .edit-btn {
            right: 1.6rem;
        }

        .event-card:hover .card-btn,
        .event-card.expanded .card-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .edit-btn:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .card-btn {
                display: none;
            }

            .event-card.expanded .card-btn {
                display: block;
                opacity: 1;
                pointer-events: auto;
            }
        }

        /* ========== FAB ========== */
        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding-bottom: 4px;
            transition: transform 0.15s, background 0.15s;
        }

        .fab:hover {
            transform: scale(1.1);
            background: var(--accent-hover);
        }

        /* ========== MODALS ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-size: 1.25rem;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.65rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9375rem;
            transition: border-color 0.15s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .form-row {
            display: flex;
            gap: 0.75rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        .category-selector {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }

        .category-selector select {
            flex: 1;
        }

        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        .modal-buttons button {
            flex: 1;
            padding: 0.65rem;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-cancel {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-cancel:hover {
            background: var(--border-color);
        }

        .color-picker {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .color-option {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.15s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: white;
            box-shadow: 0 0 0 2px var(--accent);
        }

        .color-option.selected::after {
            content: '✓';
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .category-list {
            margin-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.45rem 0.65rem;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 0.4rem;
        }

        .delete-category-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.2rem;
            line-height: 1;
        }

        .delete-category-btn:hover {
            color: #ef4444;
        }

        /* Linked event picker */
        .linked-event-picker {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .linked-event-picker input {
            border: none;
            border-radius: 0;
            background: transparent;
        }

        .linked-event-list {
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .linked-event-list.visible {
            display: block;
        }

        .linked-event-item {
            padding: 0.65rem;
            cursor: pointer;
            transition: background 0.1s;
        }

        .linked-event-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .linked-event-item.selected {
            background: rgba(124, 58, 237, 0.25);
        }

        .linked-event-year {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .linked-event-title {
            font-size: 0.85rem;
        }

        /* Empty State */
        .empty-state {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-secondary);
            z-index: 5;
            pointer-events: none;
        }

        .empty-state h3 {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .empty-state p {
            font-size: 0.875rem;
        }

        /* Year indicator */
        .year-indicator {
            position: fixed;
            bottom: 2rem;
            left: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.4rem 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            z-index: 100;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.3s, border-color 0.2s, box-shadow 0.2s;
            font-variant-numeric: tabular-nums;
            cursor: pointer;
            user-select: none;
        }

        .year-indicator.visible {
            opacity: 1;
        }

        .year-indicator:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }

        .year-indicator input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--accent);
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 700;
            width: 5em;
            outline: none;
            font-variant-numeric: tabular-nums;
            font-family: inherit;
            padding: 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .toolbar {
                padding: 0.35rem 0.5rem;
            }

            .toolbar-row.top-row {
                flex-wrap: wrap;
            }

            .modal {
                background: var(--bg-secondary);
                border-radius: 16px;
                padding: 1rem;
                max-width: 350px;
                width: 100%;
                max-height: 90vh;
                overflow-y: auto;
            }

            .modal h2 {
                font-size: 1rem;
                margin-bottom: 1rem;
                color: var(--text-primary);
            }

            .modal-buttons {
                display: flex;
                gap: 0.5rem;
            }

            .modal-buttons button {
                flex: 1;
                padding: 0.65rem;
                border-radius: 8px;
                font-size: 0.8rem;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.15s;
            }

            .search-wrapper {
                width: 100%;
                min-width: 100%;
                order: 10;
            }

            .search-input {
                width: 100%;
                min-width: 100%;
                font-size: 1rem;
                padding: 0.3rem 0.5rem;
                padding-right: 1.8rem;
            }

            .form-group input,
            .form-group textarea,
            .form-group select {

                font-size: 1rem;

            }

            .tl-select {
                max-width: 100px;
                font-size: 0.7rem;
                width: 100%;
            }

            .btn {
                font-size: 0.7rem;
                padding: 0.25rem 0.4rem;
                min-width: 24px;
            }

            .zoom-slider {
                width: 50px;
            }

            .mob-toggle {
                display: inline-flex !important;
            }

            .mobile-extra {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 0.3rem;
                /* padding: 0.3rem 0; */
                /* border-top: 1px solid var(--border-color); */
                /* margin-top: 0.3rem; */
            }

            .mobile-extra.open {
                display: flex;
            }

            .pill-row {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                gap: 0.3rem;
                padding: 0.15rem 0;
            }

            .pill-row::-webkit-scrollbar {
                display: none;
            }

            .pill {
                font-size: 0.7rem;
                padding: 0.2rem 0.4rem;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .event-card {
                min-width: 120px;
                max-width: 160px;
                padding: 0.4rem 0.5rem;
            }

            .event-card.left-side {
                margin-left: -8px;
            }

            .event-card.right-side {
                margin-left: 8px;
            }

            .event-date {
                font-size: 0.6rem;
            }

            .event-name {
                font-size: 0.75rem;
            }

            .century-label.left-side {
                margin-left: -30px;
            }

            .century-label.right-side {
                margin-left: 10px;
            }

            .fab {
                bottom: 1.5rem;
                right: 1.5rem;
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
            }

            .year-indicator {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-row top-row">
            <select class="tl-select" id="timelineSelect" onchange="switchTimeline(this.value)"></select>
            <button class="btn" onclick="addTimeline()" title="Nuova timeline">＋</button>
            <button class="btn" onclick="renameTimeline()" title="Rinomina">✎</button>
            <button class="btn danger" onclick="deleteTimeline()" title="Elimina">×</button>

            <span class="search-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="Cerca anno o parola..."
                    oninput="searchEvents()" onkeydown="handleSearchEnter(event)">
                <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">×</button>
            </span>

            <span class="zoom-group">
                <button class="btn" onclick="zoomOut()">−</button>
                <input type="range" class="zoom-slider" id="zoomSlider" min="3" max="80" value="20" step="1"
                    oninput="setZoom(this.value)">
                <button class="btn" onclick="zoomIn()">＋</button>
                <span class="zoom-label" id="zoomLabel">20px</span>
            </span>

            <button class="btn mob-toggle" onclick="toggleMobileMenu()">▼</button>
            <div class="mobile-extra" id="mobileExtra">
                <div style="display:flex;gap:0.3rem;justify-content:center;">
                    <button class="btn" onclick="exportData()">Esporta</button>
                    <button class="btn" onclick="document.getElementById('importInput').click()">Importa</button>
                    <button class="btn danger" onclick="confirmDeleteAll()">Resetta</button>
                    <input type="file" id="importInput" accept=".json" style="display:none"
                        onchange="importData(event)">
                </div>
            </div>

        </div>


        <div class="pill-row" id="pillRow"></div>
    </div>

    <!-- Ruler -->
    <div class="timeline-ruler" id="timelineRuler">
        <svg class="links-svg" id="linksSvg"></svg>
        <div class="ruler-center"></div>
        <div id="rulerMarks"></div>
        <div id="eventsContainer"></div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
        <h3>Timeline Vuota</h3>
        <p>Clicca + per aggiungere il tuo primo evento</p>
    </div>

    <!-- Year indicator -->
    <div class="year-indicator" id="yearIndicator"></div>

    <button class="fab" onclick="openModal()">+</button>

    <!-- Event Modal -->
    <div class="modal-overlay" id="eventModal">
        <div class="modal">
            <h2 id="eventModalTitle">Nuovo Evento</h2>
            <form id="eventForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="startYear">Anno Inizio *</label>
                        <input type="number" id="startYear" required placeholder="es. 1000">
                        <small style="color:var(--text-secondary);font-size:0.6875rem;">Negativo = a.C.</small>
                    </div>
                    <div class="form-group">
                        <label for="startMonth">Mese</label>
                        <input type="number" id="startMonth" min="1" max="12" placeholder="1-12">
                    </div>
                    <div class="form-group">
                        <label for="startDay">Giorno</label>
                        <input type="number" id="startDay" min="1" max="31" placeholder="1-31">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="endYear">Anno Fine</label>
                        <input type="number" id="endYear" placeholder="es. 1200">
                    </div>
                    <div class="form-group">
                        <label for="endMonth">Mese Fine</label>
                        <input type="number" id="endMonth" min="1" max="12" placeholder="1-12">
                    </div>
                    <div class="form-group">
                        <label for="endDay">Giorno Fine</label>
                        <input type="number" id="endDay" min="1" max="31" placeholder="1-31">
                    </div>
                </div>
                <div class="form-group">
                    <label for="eventTitle">Nome Evento *</label>
                    <input type="text" id="eventTitle" required placeholder="es. Caduta dell'Impero Romano">
                </div>
                <div class="form-group">
                    <label for="eventDescription">Descrizione</label>
                    <textarea id="eventDescription" placeholder="Descrivi l'evento..."></textarea>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <div class="category-selector">
                        <select id="categorySelect">
                            <option value="">Seleziona categoria...</option>
                        </select>
                        <button type="button" class="btn"
                            style="background:var(--accent);color:#fff;border:var(--accent);"
                            onclick="openCategoryModal()">+</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Collega a evento</label>
                    <div class="linked-event-picker">
                        <div id="selectedLinkedEvent"
                            style="display:none;padding:0.65rem;background:rgba(124,58,237,0.15);border-bottom:1px solid var(--border-color);">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <div id="selectedLinkedEventYear"
                                        style="font-size:0.7rem;color:var(--text-secondary);"></div>
                                    <div id="selectedLinkedEventTitle" style="font-size:0.85rem;"></div>
                                </div>
                                <button type="button" onclick="clearLinkedEvent()"
                                    style="background:transparent;border:none;color:var(--text-secondary);cursor:pointer;font-size:1.1rem;">×</button>
                            </div>
                        </div>
                        <input type="text" id="eventSearchInput" placeholder="Cerca evento da collegare..."
                            oninput="filterLinkedEvents()">
                        <div id="linkedEventList" class="linked-event-list"></div>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Annulla</button>
                    <button type="submit" class="btn"
                        style="background:var(--accent);color:#fff;border:none;">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Category Modal -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <h2>Gestione Categorie</h2>
            <form id="categoryForm">
                <div class="form-group">
                    <label for="categoryName">Nome Categoria *</label>
                    <input type="text" id="categoryName" required placeholder="es. Politica, Cultura...">
                </div>
                <div class="form-group">
                    <label>Colore</label>
                    <div class="color-picker" id="colorPicker"></div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeCategoryModal()">Annulla</button>
                    <button type="submit" class="btn"
                        style="background:var(--accent);color:#fff;border:none;">Salva</button>
                </div>
            </form>
            <div class="category-list" id="categoryList"></div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal-overlay" id="deleteConfirmModal">
        <div class="modal">
            <h2>Conferma Reset</h2>
            <p>Vuoi esportare i dati prima di cancellarli?</p>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" onclick="closeDeleteModal()">Annulla</button>
                <button type="button" class="btn danger" onclick="deleteWithoutExport()">Solo Resetta</button>
                <button type="button" class="btn" style="background:var(--accent);color:#fff;"
                    onclick="exportAndDelete()">Esporta e Resetta</button>
            </div>
        </div>
    </div>

    <!-- Timeline Name Modal -->
    <div class="modal-overlay" id="timelineModal">
        <div class="modal">
            <h2 id="timelineModalTitle">Nuova Timeline</h2>
            <form id="timelineForm">
                <div class="form-group">
                    <label for="timelineName">Nome Timeline</label>
                    <input type="text" id="timelineName" required placeholder="es. Storia Antica">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeTimelineModal()">Annulla</button>
                    <button type="submit" class="btn"
                        style="background:var(--accent);color:#fff;border:none;">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ================================================================
        //  CONSTANTS
        // ================================================================

        const AVAILABLE_COLORS = [
            '#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16',
            '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6',
            '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899'
        ];

        const STORAGE_KEY = 'timeline_app_v3';
        const START_YEAR = 1194;
        const TOTAL_YEARS = 2000;

        // ================================================================
        //  STATE
        // ================================================================

        // pixelsPerYear: used by yearToPixels(), changed by zoom
        let pixelsPerYear = 20;

        // state.timelines: { id: { id, name, events: [], categories: [] } }
        // state.currentTimelineId: which one is active
        let state = {
            timelines: {},
            currentTimelineId: null
        };

        // UI state
        let selectedCategoryId = null;
        let selectedColor = AVAILABLE_COLORS[0];
        let editingEventId = null;
        let searchResults = [];
        let currentSearchIndex = 0;
        let selectedLinkedEventId = null;
        let timelineModalMode = 'add'; // 'add' or 'rename'

        // Expanded card tracking for dynamic push-down
        let expandedEventId = null;
        let cardDisplacements = {}; // { eventId: displacementPx }

        // Active category filters (array of category IDs, empty = show all)
        let activeCategoryFilters = [];

        // ================================================================
        //  HELPERS
        // ================================================================

        function generateId() {
            return Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatYear(year, month, day) {
            var result = '';
            if (year < 0) {
                result = Math.abs(year) + ' a.C.';
            } else {
                result = '' + year;
            }
            if (month) {
                var monthNames = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];
                result += ' ' + monthNames[month - 1];
                if (day) {
                    result += ' ' + day;
                }
            }
            return result;
        }

        function yearToPixels(year, month, day) {
            var position = (year - (START_YEAR - TOTAL_YEARS)) * pixelsPerYear + 100;
            if (month) {
                position += (month - 1) * (pixelsPerYear / 12);
                if (day) {
                    position += (day - 1) * (pixelsPerYear / 365);
                }
            }
            return position;
        }

        // ================================================================
        //  DATA PERSISTENCE
        // ================================================================

        function loadState() {
            var stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    var parsed = JSON.parse(stored);
                    if (parsed && parsed.timelines && parsed.currentTimelineId &&
                        parsed.timelines[parsed.currentTimelineId]) {
                        state = parsed;
                        // Normalize all IDs to strings for consistent comparisons
                        Object.values(state.timelines).forEach(function (tl) {
                            if (tl.categories) {
                                tl.categories.forEach(function (cat) { cat.id = String(cat.id); });
                            }
                            if (tl.events) {
                                tl.events.forEach(function (evt) {
                                    evt.id = String(evt.id);
                                    if (evt.categoryId !== null && evt.categoryId !== undefined) {
                                        evt.categoryId = String(evt.categoryId);
                                    }
                                    if (evt.linkedEventId !== null && evt.linkedEventId !== undefined) {
                                        evt.linkedEventId = String(evt.linkedEventId);
                                    }
                                });
                            }
                        });
                        return;
                    }
                } catch (e) { /* ignore */ }
            }

            // Try to migrate old data (timeline_events_v2 / timeline_categories_v2)
            var oldEvents = localStorage.getItem('timeline_events_v2');
            var oldCategories = localStorage.getItem('timeline_categories_v2');

            if (oldEvents || oldCategories) {
                var events = oldEvents ? JSON.parse(oldEvents) : [];
                var categories = oldCategories ? JSON.parse(oldCategories) : [];
                var timelineId = generateId();
                state.timelines[timelineId] = {
                    id: timelineId,
                    name: 'Timeline (importata dal backup)',
                    events: events,
                    categories: categories
                };
                state.currentTimelineId = timelineId;
                // Remove old keys
                localStorage.removeItem('timeline_events_v2');
                localStorage.removeItem('timeline_categories_v2');
                saveState();
                return;
            }

            // Fresh start
            var defaultId = 'default';
            state.timelines[defaultId] = {
                id: defaultId,
                name: 'Timeline 1',
                events: [],
                categories: []
            };
            state.currentTimelineId = defaultId;
            saveState();
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function getCurrentTimeline() {
            return state.timelines[state.currentTimelineId];
        }

        function getEvents() {
            var timeline = getCurrentTimeline();
            return timeline ? timeline.events : [];
        }

        function getCategories() {
            var timeline = getCurrentTimeline();
            return timeline ? timeline.categories : [];
        }

        function setEvents(events) {
            var timeline = getCurrentTimeline();
            if (timeline) timeline.events = events;
        }

        function setCategories(categories) {
            var timeline = getCurrentTimeline();
            if (timeline) timeline.categories = categories;
        }

        // ================================================================
        //  TOAST
        // ================================================================

        function showToast(message, type) {
            if (!type) type = 'info';
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function () {
                if (toast.parentNode) toast.remove();
            }, 3000);
        }

        // ================================================================
        //  TIMELINE MANAGEMENT
        // ================================================================

        function renderTimelineSelect() {
            var select = document.getElementById('timelineSelect');
            select.innerHTML = '';
            var timelineList = Object.values(state.timelines);
            timelineList.sort(function (a, b) { return a.name.localeCompare(b.name); });
            timelineList.forEach(function (timeline) {
                var option = document.createElement('option');
                option.value = timeline.id;
                option.textContent = timeline.name;
                if (timeline.id === state.currentTimelineId) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
        }

        function switchTimeline(timelineId) {
            if (timelineId === state.currentTimelineId) return;
            if (!state.timelines[timelineId]) return;
            state.currentTimelineId = timelineId;
            saveState();
            expandedEventId = null;
            fullRender();
            showToast('Timeline: ' + getCurrentTimeline().name, 'info');
        }

        function addTimeline() {
            timelineModalMode = 'add';
            document.getElementById('timelineModalTitle').textContent = 'Nuova Timeline';
            document.getElementById('timelineName').value = '';
            document.getElementById('timelineModal').classList.add('open');
        }

        function renameTimeline() {
            var timeline = getCurrentTimeline();
            if (!timeline) return;
            timelineModalMode = 'rename';
            document.getElementById('timelineModalTitle').textContent = 'Rinomina Timeline';
            document.getElementById('timelineName').value = timeline.name;
            document.getElementById('timelineModal').classList.add('open');
        }

        function deleteTimeline() {
            var timeline = getCurrentTimeline();
            if (!timeline) return;
            if (Object.keys(state.timelines).length <= 1) {
                showToast('Devi avere almeno una timeline', 'error');
                return;
            }
            if (!confirm('Eliminare la timeline "' + timeline.name + '"?')) return;
            delete state.timelines[state.currentTimelineId];
            state.currentTimelineId = Object.keys(state.timelines)[0];
            saveState();
            expandedEventId = null;
            fullRender();
            showToast('Timeline eliminata', 'info');
        }

        function closeTimelineModal() {
            document.getElementById('timelineModal').classList.remove('open');
        }

        function saveTimeline() {
            var name = document.getElementById('timelineName').value.trim();
            if (!name) {
                showToast('Inserisci un nome', 'error');
                return;
            }
            if (timelineModalMode === 'add') {
                var id = generateId();
                state.timelines[id] = {
                    id: id,
                    name: name,
                    events: [],
                    categories: []
                };
                state.currentTimelineId = id;
                saveState();
                expandedEventId = null;
                fullRender();
                showToast('Timeline "' + name + '" creata', 'success');
            } else {
                var timeline = getCurrentTimeline();
                if (timeline) {
                    timeline.name = name;
                    saveState();
                    renderTimelineSelect();
                    showToast('Timeline rinominata', 'success');
                }
            }
            closeTimelineModal();
        }

        // ================================================================
        //  ZOOM
        // ================================================================

        function setZoom(value) {
            var ruler = document.getElementById('timelineRuler');
            // Save which year is currently centered on screen
            var currentScrollY = ruler.scrollTop + window.innerHeight / 2;
            var currentYear = Math.round((currentScrollY - 100) / pixelsPerYear) + START_YEAR - TOTAL_YEARS;

            pixelsPerYear = parseInt(value);
            document.getElementById('zoomLabel').textContent = pixelsPerYear + 'px';
            document.getElementById('zoomSlider').value = pixelsPerYear;
            fullRender();

            // Re-scroll to the same year after render
            requestAnimationFrame(function () {
                var yearPosition = yearToPixels(currentYear);
                ruler.scrollTop = yearPosition - window.innerHeight / 2;
            });
        }

        function zoomIn() {
            var slider = document.getElementById('zoomSlider');
            var value = parseInt(slider.value) + 5;
            if (value > 80) value = 80;
            setZoom(value);
        }

        function zoomOut() {
            var slider = document.getElementById('zoomSlider');
            var value = parseInt(slider.value) - 5;
            if (value < 3) value = 3;
            setZoom(value);
        }

        // ================================================================
        //  CATEGORY FILTER PILLS
        // ================================================================

        function renderPills() {
            var container = document.getElementById('pillRow');
            container.innerHTML = '';

            // "Tutte" pill
            var allPill = document.createElement('span');
            allPill.className = 'pill' + (activeCategoryFilters.length === 0 ? ' active' : '');
            allPill.textContent = 'Tutte';
            allPill.onclick = function () {
                activeCategoryFilters = [];
                renderPills();
                renderEvents();
            };
            container.appendChild(allPill);

            // One pill per category (multi-toggle)
            var categories = getCategories();
            categories.forEach(function (category) {
                var isActive = activeCategoryFilters.indexOf(category.id) !== -1;
                var pill = document.createElement('span');
                pill.className = 'pill' + (isActive ? ' active' : '');
                pill.textContent = category.name;
                pill.style.borderLeft = '3px solid ' + category.color;
                pill.onclick = function () {
                    var idx = activeCategoryFilters.indexOf(category.id);
                    if (idx !== -1) {
                        activeCategoryFilters.splice(idx, 1);
                    } else {
                        activeCategoryFilters.push(category.id);
                    }
                    renderPills();
                    renderEvents();
                };
                container.appendChild(pill);
            });
        }

        // ================================================================
        //  RULER
        // ================================================================

        function renderRuler() {
            var container = document.getElementById('rulerMarks');
            container.innerHTML = '';

            for (var year = START_YEAR - TOTAL_YEARS; year <= START_YEAR + TOTAL_YEARS; year++) {
                var position = yearToPixels(year);

                if (year % 100 === 0) {
                    // Century mark
                    var mark = document.createElement('div');
                    mark.className = 'year-mark century';
                    mark.style.top = position + 'px';
                    container.appendChild(mark);

                    // Century label
                    var label = document.createElement('div');
                    var side = (year % 200 === 0) ? 'left-side' : 'right-side';
                    label.className = 'century-label ' + side;
                    label.style.top = (position - 8) + 'px';
                    label.textContent = formatYear(year);

                    // Make every 500 years more prominent
                    if (year % 500 === 0) {
                        label.style.fontSize = '0.85rem';
                        label.style.color = 'var(--text-primary)';
                        label.style.fontWeight = '700';
                    }

                    container.appendChild(label);
                } else if (year % 10 === 0) {
                    // Decade mark
                    var mark = document.createElement('div');
                    mark.className = 'year-mark decade';
                    mark.style.top = position + 'px';
                    container.appendChild(mark);
                } else {
                    // Year mark
                    var mark = document.createElement('div');
                    mark.className = 'year-mark year';
                    mark.style.top = position + 'px';
                    container.appendChild(mark);
                }
            }
        }

        // ================================================================
        //  EVENTS RENDER (with dynamic push-down on expand)
        // ================================================================

        function renderEvents() {
            var container = document.getElementById('eventsContainer');
            var emptyState = document.getElementById('emptyState');
            var categories = getCategories();

            container.innerHTML = '';

            // Filter events
            var filteredEvents = getEvents().slice();
            if (activeCategoryFilters.length > 0) {
                filteredEvents = filteredEvents.filter(function (e) {
                    return activeCategoryFilters.indexOf(String(e.categoryId)) !== -1;
                });
            }

            // Show empty state if no events
            if (filteredEvents.length === 0) {
                emptyState.style.display = 'block';
                if (activeCategoryFilters.length > 0) {
                    emptyState.querySelector('h3').textContent = 'Nessun evento in questa categoria';
                    emptyState.querySelector('p').textContent = 'Cambia filtro o aggiungi nuovi eventi';
                } else {
                    emptyState.querySelector('h3').textContent = 'Timeline Vuota';
                    emptyState.querySelector('p').textContent = 'Clicca + per aggiungere il tuo primo evento';
                }
                return ;
            }
            emptyState.style.display = 'none';

            // Sort by year
            filteredEvents.sort(function (a, b) {
                return a.startYear - b.startYear;
            });

            // Assign sides (left/right) per category
            var categorySides = {};
            filteredEvents.forEach(function (event) {
                if (event.categoryId && !categorySides[event.categoryId]) {
                    var side = (Object.keys(categorySides).length % 2 === 0) ? 'left' : 'right';
                    categorySides[event.categoryId] = side;
                }
            });

            // Calculate positions (with collision avoidance)
            var eventPositions = {};
            var eventSides = {};
            var basePositions = {};
            var minSpacing = 60;

            filteredEvents.forEach(function (event, index) {
                var category = categories.find(function (c) { return c.id === event.categoryId; });
                var defaultSide = category ? categorySides[event.categoryId] : (index % 2 === 0 ? 'left' : 'right');
                var yearPos = yearToPixels(event.startYear, event.startMonth, event.startDay);
                basePositions[event.id] = yearPos;
                var adjustedPosition = yearPos;
                var offset = 0;
                var currentSide = defaultSide;

                for (var i = 0; i < index; i++) {
                    var prevEvent = filteredEvents[i];
                    var prevPosition = eventPositions[prevEvent.id];
                    var prevSide = eventSides[prevEvent.id];

                    if (Math.abs(yearPos - prevPosition) < minSpacing) {
                        if (prevSide === currentSide) {
                            // Try to switch side
                            var otherSide = (currentSide === 'left') ? 'right' : 'left';
                            var canSwitch = true;

                            for (var j = 0; j < index; j++) {
                                var checkEvent = filteredEvents[j];
                                if (eventSides[checkEvent.id] === otherSide &&
                                    Math.abs(yearPos - eventPositions[checkEvent.id]) < minSpacing) {
                                    canSwitch = false;
                                    break;
                                }
                            }

                            if (canSwitch) {
                                currentSide = otherSide;
                            } else {
                                offset = Math.max(offset, minSpacing - Math.abs(yearPos - prevPosition));
                            }
                        } else {
                            offset = Math.max(offset, minSpacing - Math.abs(yearPos - prevPosition));
                        }
                    }
                }

                adjustedPosition = yearPos + offset;
                eventPositions[event.id] = adjustedPosition;
                eventSides[event.id] = currentSide;
            });

            // --- RENDER ---
            filteredEvents.forEach(function (event) {
                var category = categories.find(function (c) { return c.id === event.categoryId; });
                var side = eventSides[event.id];
                var color = category ? category.color : '#7c3aed';
                var position = eventPositions[event.id];

                // Event node on the ruler line
                var node = document.createElement('div');
                node.className = 'event-node' + (expandedEventId === event.id ? ' expanded-node' : '');
                node.style.top = (basePositions[event.id] - 5) + 'px';
                node.style.background = color;
                container.appendChild(node);

                // Event card
                var card = document.createElement('div');
                card.className = 'event-card ' + side + '-side';
                card.style.top = (position - 15) + 'px';
                card.style.borderColor = color;
                card.dataset.eventId = event.id;

                var yearText = formatYear(event.startYear, event.startMonth, event.startDay);
                if (event.endYear) {
                    yearText += ' - ' + formatYear(event.endYear, event.endMonth, event.endDay);
                }

                if (expandedEventId === event.id) {
                    card.classList.add('expanded');
                }

                card.innerHTML =
                    '<button class="card-btn delete-btn" onclick="event.stopPropagation(); deleteEvent(\'' + event.id + '\')">×</button>' +
                    '<button class="card-btn edit-btn" onclick="event.stopPropagation(); editEvent(\'' + event.id + '\')">✎</button>' +
                    '<div class="event-date" style="color:' + color + '">' + yearText + '</div>' +
                    '<div class="event-name">' + escapeHtml(event.title) + '</div>' +
                    (event.description ? '<div class="event-description">' + escapeHtml(event.description) + '</div>' : '');

                card.addEventListener('click', function (e) {
                    e.stopPropagation();
                    toggleExpand(event.id);
                });

                container.appendChild(card);
            });

            // Draw connecting lines
            drawCategoryConnectors(filteredEvents, categorySides, eventPositions, categories);
            drawLinkedEventLines(filteredEvents, eventPositions, categories);
            // ==========================================
            // NUOVA LOGICA: SCROLL AL PRIMO EVENTO FILTRATO
            // ==========================================
            if (activeCategoryFilters.length > 0 && filteredEvents.length > 0) {
                scrollToYear(filteredEvents[0].startYear);
            }
        }

        // ================================================================
        //  CATEGORY CONNECTORS (SVG)
        // ================================================================

        function drawCategoryConnectors(sortedEvents, categorySides, eventPositions, categories) {
            var svg = document.getElementById('linksSvg');
            // Remove old category connectors
            svg.querySelectorAll('.category-connector').forEach(function (el) { el.remove(); });

            var centerX = window.innerWidth * 0.5;
            var isMobile = window.innerWidth <= 768;
            var slotWidth = isMobile ? 20 : 35;

            // Compute Y ranges per category for slot reuse
            var categoryRanges = {};
            Object.keys(categorySides).forEach(function (categoryId) {
                var catEvents = sortedEvents.filter(function (e) {
                    return String(e.categoryId) === String(categoryId);
                });
                if (catEvents.length < 2) return;
                var ys = catEvents.map(function (e) { return eventPositions[e.id] || 0; });
                categoryRanges[categoryId] = { minY: Math.min.apply(null, ys), maxY: Math.max.apply(null, ys) };
            });

            // Assign slots per side with reuse
            var sideSlots = { left: [], right: [] };
            var categorySlots = {};

            // Sort categories by minY for each side
            ['left', 'right'].forEach(function (side) {
                var catsOnSide = Object.keys(categoryRanges).filter(function (id) { return categorySides[id] === side; });
                catsOnSide.sort(function (a, b) { return categoryRanges[a].minY - categoryRanges[b].minY; });

                catsOnSide.forEach(function (categoryId) {
                    var range = categoryRanges[categoryId];
                    var assignedSlot = -1;
                    // Find first slot where this category doesn't overlap
                    for (var s = 0; s < sideSlots[side].length; s++) {
                        var lastEnd = sideSlots[side][s];
                        if (range.minY > lastEnd + 10) {
                            assignedSlot = s;
                            break;
                        }
                    }
                    if (assignedSlot === -1) {
                        assignedSlot = sideSlots[side].length;
                        sideSlots[side].push(0);
                    }
                    sideSlots[side][assignedSlot] = range.maxY;
                    categorySlots[categoryId] = assignedSlot;
                });
            });

            // Draw connectors
            Object.keys(categorySides).forEach(function (categoryId) {
                var catEvents = sortedEvents.filter(function (e) {
                    return String(e.categoryId) === String(categoryId);
                });
                if (catEvents.length < 2) return;

                var category = categories.find(function (c) { return String(c.id) === String(categoryId); });
                if (!category) return;

                var side = categorySides[categoryId];
                var slotIndex = categorySlots[categoryId] || 0;
                var categoryOffset = slotIndex * slotWidth;

                var connectorX;
                if (side === 'left') {
                    connectorX = centerX - 15 - categoryOffset;
                } else {
                    connectorX = centerX + 15 + categoryOffset;
                }

                var points = catEvents.map(function (e) {
                    return { y: eventPositions[e.id] || 0 };
                });

                var pathData = '';
                points.forEach(function (point, index) {
                    if (index === 0) {
                        pathData += 'M ' + connectorX + ' ' + point.y;
                    } else {
                        var prevY = points[index - 1].y;
                        var curveDir = (side === 'left') ? -15 : 15;
                        pathData += ' C ' + (connectorX + curveDir) + ' ' + prevY +
                            ', ' + (connectorX + curveDir) + ' ' + point.y +
                            ', ' + connectorX + ' ' + point.y;
                    }
                });

                var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathData);
                path.setAttribute('stroke', category.color);
                path.setAttribute('stroke-width', '1.5');
                path.setAttribute('fill', 'none');
                path.setAttribute('opacity', '0.4');
                path.setAttribute('class', 'category-connector');
                svg.appendChild(path);
            });
        }

        // ================================================================
        //  LINKED EVENT LINES (SVG)
        // ================================================================

        function drawLinkedEventLines(sortedEvents, eventPositions, categories) {
            var svg = document.getElementById('linksSvg');
            // Remove old link lines
            svg.querySelectorAll('.link-connector, .link-defs').forEach(function (el) { el.remove(); });

            sortedEvents.forEach(function (event) {
                if (!event.linkedEventId) return;

                var linkedEvent = sortedEvents.find(function (e) { return String(e.id) === String(event.linkedEventId); });
                if (!linkedEvent) return;

                var categoryA = categories.find(function (c) { return c.id === event.categoryId; });
                var categoryB = categories.find(function (c) { return c.id === linkedEvent.categoryId; });

                var dateA = new Date(event.startYear, event.startMonth || 0, event.startDay || 1);
                var dateB = new Date(linkedEvent.startYear, linkedEvent.startMonth || 0, linkedEvent.startDay || 1);
                var linkedIsEarlier = dateB < dateA;

                var colorA = categoryA ? categoryA.color : '#7c3aed';
                var colorB = categoryB ? categoryB.color : '#7c3aed';

                if (linkedIsEarlier) {
                    var temp = colorA;
                    colorA = colorB;
                    colorB = temp;
                }

                var startY = (eventPositions[event.id] || 0) + (cardDisplacements[event.id] || 0);
                var endY = (eventPositions[linkedEvent.id] || 0) + (cardDisplacements[linkedEvent.id] || 0);
                var centerX = window.innerWidth * 0.5 + 15;

                var curveAmount = Math.max(40, Math.abs(endY - startY) * 0.15);
                var gradientId = 'grad_' + event.id + '_' + linkedEvent.id;

                // Create gradient + glow filter
                var glowId = 'glow_' + event.id + '_' + linkedEvent.id;
                var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                defs.innerHTML =
                    '<linearGradient id="' + gradientId + '" x1="0%" y1="0%" x2="0%" y2="100%">' +
                    '<stop offset="0%" stop-color="' + colorA + '"/>' +
                    '<stop offset="100%" stop-color="' + colorB + '"/>' +
                    '</linearGradient>' +
                    '<filter id="' + glowId + '" x="-50%" y="-50%" width="200%" height="200%">' +
                    '<feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>' +
                    '<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>' +
                    '</filter>';
                defs.classList.add('link-defs');
                svg.appendChild(defs);

                // Create path
                var d = 'M ' + centerX + ' ' + startY +
                    ' C ' + (centerX + curveAmount) + ' ' + startY +
                    ', ' + (centerX + curveAmount) + ' ' + endY +
                    ', ' + centerX + ' ' + endY;

                // Glow layer (wider, more transparent)
                var glowPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                glowPath.setAttribute('d', d);
                glowPath.setAttribute('stroke', 'url(#' + gradientId + ')');
                glowPath.setAttribute('stroke-width', '9');
                glowPath.setAttribute('fill', 'none');
                glowPath.setAttribute('opacity', '0.3');
                glowPath.setAttribute('filter', 'url(#' + glowId + ')');
                glowPath.setAttribute('class', 'link-connector');
                svg.appendChild(glowPath);

                // Main path (thicker, more visible)
                var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', d);
                path.setAttribute('stroke', 'url(#' + gradientId + ')');
                path.setAttribute('stroke-width', '3.5');
                path.setAttribute('fill', 'none');
                path.setAttribute('opacity', '0.8');
                path.setAttribute('class', 'link-connector');
                svg.appendChild(path);
            });
        }

        // ================================================================
        //  SEARCH
        // ================================================================

        function searchEvents() {
            var rawTerm = document.getElementById('searchInput').value;
            var searchTerm = rawTerm.toLowerCase();
            var allCards = document.querySelectorAll('.event-card');
            var clearBtn = document.getElementById('searchClear');

            // Show/hide clear button
            clearBtn.style.display = rawTerm ? 'block' : 'none';

            if (!searchTerm) {
                allCards.forEach(function (card) {
                    card.style.opacity = '1';
                    card.style.pointerEvents = 'auto';
                });
                searchResults = [];
                currentSearchIndex = 0;
                return;
            }

            // Check if the search term is a pure number (year search)
            var isYearSearch = /^\-?\d+$/.test(searchTerm.trim());

            if (isYearSearch) {
                // Year-only search: scroll to that year, keep all events visible
                var targetYear = parseInt(searchTerm.trim());
                allCards.forEach(function (card) {
                    card.style.opacity = '1';
                    card.style.pointerEvents = 'auto';
                });
                searchResults = [];
                currentSearchIndex = 0;
                scrollToYear(targetYear);
                return;
            }

            // Text search: highlight matching events, dim the rest
            var events = getEvents();
            searchResults = [];

            allCards.forEach(function (card) {
                var eventId = card.dataset.eventId;
                var event = events.find(function (e) { return e.id === eventId; });
                if (!event) return;

                var searchText = formatYear(event.startYear) + ' ' + event.title + ' ' + (event.description || '');
                if (searchText.toLowerCase().includes(searchTerm)) {
                    card.style.opacity = '1';
                    card.style.pointerEvents = 'auto';
                    searchResults.push(event);
                } else {
                    card.style.opacity = '0.15';
                    card.style.pointerEvents = 'none';
                }
            });

            if (searchResults.length > 0) {
                currentSearchIndex = 0;
                scrollToYear(searchResults[0].startYear);
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').style.display = 'none';
            searchEvents();
        }

        function handleSearchEnter(e) {
            if (e.key === 'Enter' && searchResults.length > 0) {
                currentSearchIndex = (currentSearchIndex + 1) % searchResults.length;
                scrollToYear(searchResults[currentSearchIndex].startYear);
            }
        }

        function scrollToYear(year) {
            var position = yearToPixels(year);
            document.getElementById('timelineRuler').scrollTop = position - window.innerHeight / 2;
        }

        function scrollToLatestEvent() {
            var events = getEvents();
            if (events.length === 0) {
                scrollToYear(START_YEAR);
                return;
            }
            var latest = events.reduce(function (a, b) {
                return a.startYear > b.startYear ? a : b;
            });
            scrollToYear(latest.startYear);
        }

        // ================================================================
        //  EXPORT / IMPORT
        // ================================================================

        function exportData() {
            var timeline = getCurrentTimeline();
            if (!timeline) return;

            var data = JSON.stringify({ timeline: timeline, exportDate: new Date().toISOString() }, null, 2);
            var blob = new Blob([data], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            var filename = 'timeline_' + timeline.name.replace(/[^a-zA-Z0-9]/g, '_') +
                '_' + new Date().toISOString().split('T')[0] + '.json';
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('Dati esportati', 'success');
        }

        function importData(event) {
            var file = event.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function (e) {
                try {
                    var data = JSON.parse(e.target.result);

                    // New format: { timeline: { events, categories } }
                    if (data.timeline && data.timeline.events && data.timeline.categories) {
                        var id = generateId();
                        state.timelines[id] = {
                            id: id,
                            name: (data.timeline.name || 'Importata') + ' (importata)',
                            events: data.timeline.events,
                            categories: data.timeline.categories
                        };
                        state.currentTimelineId = id;
                        saveState();
                        expandedEventId = null;
                        fullRender();
                        showToast('Timeline importata', 'success');
                    }
                    // Legacy format: { events: [...], categories: [...] }
                    else if (data.events && Array.isArray(data.events)) {
                        var id = generateId();
                        state.timelines[id] = {
                            id: id,
                            name: 'Importata (legacy)',
                            events: data.events,
                            categories: data.categories || []
                        };
                        state.currentTimelineId = id;
                        saveState();
                        expandedEventId = null;
                        fullRender();
                        showToast('Dati importati', 'success');
                    } else {
                        showToast('File non valido', 'error');
                    }
                } catch (err) {
                    showToast('Errore durante l\'importazione', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
