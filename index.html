        function deleteCategory(categoryId) {
            if (!confirm('Eliminare questa categoria?')) return;
            var cats = getCategories().filter(function (c) { return String(c.id) !== String(categoryId); });
            setCategories(cats);
            var evs = getEvents();
            evs.forEach(function (event) {
                if (String(event.categoryId) === String(categoryId)) {
                    event.categoryId = null;
                }
            });
            setEvents(evs);
            saveState();
            renderCategorySelect();
            renderCategoryList();
            renderPills();
            renderEvents();
            showToast('Categoria eliminata', 'info');
        }

        function saveCategory() {
            var name = document.getElementById('categoryName').value.trim();
            if (!name) {
                showToast('Inserisci il nome della categoria', 'error');
                return;
            }
            var newCategory = {
                id: String(Date.now()) + '_' + Math.random().toString(36).slice(2, 8),
                name: name,
                color: selectedColor
            };
            var cats = getCategories();
            cats.push(newCategory);
            setCategories(cats);
            saveState();
            renderCategorySelect();
            renderPills();
            closeCategoryModal();
            selectedCategoryId = newCategory.id;
            document.getElementById('categorySelect').value = newCategory.id;
            showToast('Categoria creata', 'success');
        }

        // ================================================================
        //  EVENTS CRUD
        // ================================================================

        function saveEvent() {
            var startYear = parseInt(document.getElementById('startYear').value);
            var startMonth = document.getElementById('startMonth').value ?
                parseInt(document.getElementById('startMonth').value) : null;
            var startDay = document.getElementById('startDay').value ?
                parseInt(document.getElementById('startDay').value) : null;
            var endYear = document.getElementById('endYear').value ?
                parseInt(document.getElementById('endYear').value) : null;
            var endMonth = document.getElementById('endMonth').value ?
                parseInt(document.getElementById('endMonth').value) : null;
            var endDay = document.getElementById('endDay').value ?
                parseInt(document.getElementById('endDay').value) : null;
            var title = document.getElementById('eventTitle').value.trim();
            var description = document.getElementById('eventDescription').value.trim();
            var linkedEventId = selectedLinkedEventId;

            if (isNaN(startYear) || !title) {
                showToast('Inserisci almeno l\'anno e il nome', 'error');
                return;
            }
            if (!selectedCategoryId) {
                showToast('Seleziona una categoria', 'error');
                return;
            }

            var allEvents = getEvents();

            if (editingEventId) {
                // Update existing event
                var index = allEvents.findIndex(function (e) { return e.id === editingEventId; });
                if (index !== -1) {
                    allEvents[index] = {
                        id: editingEventId,
                        startYear: startYear,
                        startMonth: startMonth,
                        startDay: startDay,
                        endYear: endYear,
                        endMonth: endMonth,
                        endDay: endDay,
                        title: title,
                        description: description,
                        categoryId: selectedCategoryId,
                        linkedEventId: linkedEventId
                    };
                }
                showToast('Evento modificato', 'success');
            } else {
                // Create new event
                allEvents.push({
                    id: generateId(),
                    startYear: startYear,
                    startMonth: startMonth,
                    startDay: startDay,
                    endYear: endYear,
                    endMonth: endMonth,
                    endDay: endDay,
                    title: title,
                    description: description,
                    categoryId: selectedCategoryId,
                    linkedEventId: linkedEventId
                });
                showToast('Evento creato', 'success');
            }

            setEvents(allEvents);
            saveState();
            renderEvents();
            closeModal();
            scrollToYear(startYear);
        }

        function editEvent(eventId) {
            var allEvents = getEvents();
            var event = allEvents.find(function (e) { return String(e.id) === String(eventId); });
            if (!event) return;

            editingEventId = eventId;
            selectedCategoryId = event.categoryId;

            document.getElementById('startYear').value = event.startYear;
            document.getElementById('startMonth').value = event.startMonth || '';
            document.getElementById('startDay').value = event.startDay || '';
            document.getElementById('endYear').value = event.endYear || '';
            document.getElementById('endMonth').value = event.endMonth || '';
            document.getElementById('endDay').value = event.endDay || '';
            document.getElementById('eventTitle').value = event.title;
            document.getElementById('eventDescription').value = event.description || '';

            renderCategorySelect();
            document.getElementById('eventSearchInput').value = '';
            selectedLinkedEventId = event.linkedEventId || null;
            populateLinkedEvents();

            document.getElementById('eventModalTitle').textContent = 'Modifica Evento';
            document.getElementById('eventModal').classList.add('open');
        }

        function deleteEvent(eventId) {
            if (!confirm('Eliminare questo evento?')) return;
            setEvents(getEvents().filter(function (e) { return e.id !== eventId; }));
            saveState();
            if (expandedEventId === eventId) expandedEventId = null;
            renderEvents();
            showToast('Evento eliminato', 'info');
        }

        // ================================================================
        //  LINKED EVENTS PICKER
        // ================================================================

        function populateLinkedEvents(filter) {
            var container = document.getElementById('linkedEventList');
            container.innerHTML = '';

            var selectedDiv = document.getElementById('selectedLinkedEvent');
            if (selectedLinkedEventId) {
                var selectedEvent = getEvents().find(function (e) { return e.id === selectedLinkedEventId; });
                if (selectedEvent) {
                    document.getElementById('selectedLinkedEventYear').textContent = formatYear(selectedEvent.startYear);
                    document.getElementById('selectedLinkedEventTitle').textContent = selectedEvent.title;
                    selectedDiv.style.display = 'block';
                }
            } else {
                selectedDiv.style.display = 'none';

            var events = getEvents();
            events = events.filter(function (e) {
                if (editingEventId && e.id === editingEventId) return false;
                var searchText = formatYear(e.startYear) + ' ' + e.title;
                return searchText.toLowerCase().includes((filter || '').toLowerCase());
            });

            events.forEach(function (event) {
                var item = document.createElement('div');
                item.className = 'linked-event-item' + (selectedLinkedEventId === event.id ? ' selected' : '');
                item.innerHTML =
                    '<div class="linked-event-year">' + formatYear(event.startYear) + '</div>' +
                    '<div class="linked-event-title">' + escapeHtml(event.title) + '</div>';
                item.onclick = function () {
                    selectedLinkedEventId = event.id;
                    document.getElementById('eventSearchInput').value = '';
                    document.getElementById('linkedEventList').classList.remove('visible');
                    populateLinkedEvents('');
                };
                container.appendChild(item);
            });
        }

        function filterLinkedEvents() {
            var searchValue = document.getElementById('eventSearchInput').value;
            var list = document.getElementById('linkedEventList');
            if (searchValue.trim() === '') {
                list.classList.remove('visible');
            } else {
                list.classList.add('visible');
            }
            populateLinkedEvents(searchValue);
        }

        function clearLinkedEvent() {
            selectedLinkedEventId = null;
            populateLinkedEvents(document.getElementById('eventSearchInput').value);
        }

        // ================================================================
        //  MOBILE TOGGLE
        // ================================================================

        function toggleMobileMenu() {
            document.getElementById('mobileExtra').classList.toggle('open');
        }

        // ================================================================
        //  EVENT LISTENERS
        // ================================================================

        function setupEventListeners() {
            document.getElementById('eventForm').addEventListener('submit', function (e) {
                e.preventDefault();
                saveEvent();
            });

            document.getElementById('categoryForm').addEventListener('submit', function (e) {
                e.preventDefault();
                saveCategory();
            });

            document.getElementById('timelineForm').addEventListener('submit', function (e) {
                e.preventDefault();
                saveTimeline();
            });

            document.getElementById('categorySelect').addEventListener('change', function () {
                selectedCategoryId = this.value || null;
            });

            // Close modals on backdrop click
            document.getElementById('eventModal').addEventListener('click', function (e) {
                if (e.target === this) closeModal();
            });
            document.getElementById('categoryModal').addEventListener('click', function (e) {
                if (e.target === this) closeCategoryModal();
            });
            document.getElementById('deleteConfirmModal').addEventListener('click', function (e) {
                if (e.target === this) closeDeleteModal();
            });
            document.getElementById('timelineModal').addEventListener('click', function (e) {
                if (e.target === this) closeTimelineModal();
            });

            // Redraw SVG lines on window resize
            var resizeTimer;
            window.addEventListener('resize', function () {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function () {
                    renderEvents();
                }, 100);
            });

            // Year indicator on scroll + click to navigate
            var ruler = document.getElementById('timelineRuler');
            var yearIndicator = document.getElementById('yearIndicator');
            var scrollTimer;
            var yearIndicatorLocked = false; // true when user is typing a year

            function updateYearIndicator() {
                var scrollY = ruler.scrollTop + window.innerHeight / 2;
                var currentYear = Math.round((scrollY - 100) / pixelsPerYear) + START_YEAR - TOTAL_YEARS;
                yearIndicator.dataset.year = currentYear;
                if (!yearIndicatorLocked) {
                    yearIndicator.innerHTML = formatYear(currentYear);
                }
                yearIndicator.classList.add('visible');
                clearTimeout(scrollTimer);
                scrollTimer = setTimeout(function () {
                    if (!yearIndicatorLocked) {
                        yearIndicator.classList.remove('visible');
                    }
                }, 1500);
            }

            ruler.addEventListener('scroll', updateYearIndicator);

            // Click on year indicator to input a year
            yearIndicator.addEventListener('click', function (e) {
                if (yearIndicatorLocked) return; // already editing
                e.stopPropagation();
                yearIndicatorLocked = true;
                clearTimeout(scrollTimer);

                // Parse current year from data attribute
                var currentYear = parseInt(yearIndicator.dataset.year) || 0;
                yearIndicator.innerHTML = '<input type="number" value="' + currentYear + '" id="yearIndicatorInput" autofocus>';

                var input = document.getElementById('yearIndicatorInput');
                input.focus();
                input.select();

                function confirmYear() {
                    var val = parseInt(input.value);
                    if (!isNaN(val)) {
                        scrollToYear(val);
                        yearIndicator.dataset.year = val;
                        yearIndicator.innerHTML = formatYear(val);
                    } else {
                        yearIndicator.innerHTML = formatYear(currentYear);
                    }
                    yearIndicatorLocked = false;
                    // Restart auto-hide
                    clearTimeout(scrollTimer);
                    scrollTimer = setTimeout(function () {
                        yearIndicator.classList.remove('visible');
                    }, 1500);
                }

                input.addEventListener('keydown', function (ev) {
                    if (ev.key === 'Enter') {
                        ev.preventDefault();
                        confirmYear();
                    } else if (ev.key === 'Escape') {
                        yearIndicator.innerHTML = formatYear(currentYear);
                        yearIndicatorLocked = false;
                        clearTimeout(scrollTimer);
                        scrollTimer = setTimeout(function () {
                            yearIndicator.classList.remove('visible');
                        }, 1500);
                    }
                });

                input.addEventListener('blur', function () {
                    // Small delay to allow click events to process
                    setTimeout(function () {
                        if (yearIndicatorLocked) {
                            confirmYear();
                        }
                    }, 100);
                });
            });

            // Keep year indicator always visible (not just on scroll)
            yearIndicator.classList.add('visible');
        }

        // ================================================================
        //  INIT
        // ================================================================

        function init() {
            loadState();
            setupColorPicker();
            setupEventListeners();
            fullRender();
            scrollToLatestEvent();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
